name: CI

on:

  push:

  pull_request:

jobs:

  test:

    runs-on: ubuntu-latest

    steps:

      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5

        with:

          python-version: "3.12"

      - name: Install

        run: |

          pip install -r requirements.txt

          pip install black

      - name: Formatting Check

        run: |

          black --check .

      - name: Tests

        run: |

          pytest -v
