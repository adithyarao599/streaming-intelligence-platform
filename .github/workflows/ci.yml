name: CI

on:
  push:
  pull_request:

jobs:
  test:

    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16

        env:
          POSTGRES_USER: stream_admin
          POSTGRES_PASSWORD: stream_password
          POSTGRES_DB: streaming_dw

        ports:
          - 5432:5432

        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    env:
      POSTGRES_USER: stream_admin
      POSTGRES_PASSWORD: stream_password
      POSTGRES_DB: streaming_dw
      POSTGRES_HOST: localhost
      POSTGRES_PORT: 5432
      LOG_LEVEL: INFO

      AIRFLOW_HOME: /tmp/airflow
      AIRFLOW__CORE__LOAD_EXAMPLES: "False"
      AIRFLOW__DATABASE__SQL_ALCHEMY_CONN: sqlite:////tmp/airflow/airflow.db

    steps:

      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Upgrade Pip
        run: |
          python -m pip install --upgrade pip

      - name: Install Dependencies
        run: |
          pip install -r requirements.txt
          pip install black isort

      - name: Formatting Check
        run: |
          black --check .
          isort --check-only .

      - name: Prepare Airflow
        run: |
          mkdir -p /tmp/airflow

      - name: Wait for PostgreSQL
        run: |
          sleep 10

      - name: Run Tests
        run: |
          pytest -v
